name: Refresh Portfolio Data

on:
  schedule:
    # 00:00 UTC = 08:00 MYT (UTC+8), runs after US market close
    - cron: "0 0 * * 2-6"  # Tue–Sat (Mon–Fri US trading days close the night before)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices and update data
        env:
          EXCHANGERATE_API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Commit updated data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/passive_portfolio.json data/fx_rates.json data/comparison.json
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
